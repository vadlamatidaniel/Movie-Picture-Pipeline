name: Frontend Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - "starter/frontend/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - uses: actions/checkout@v3

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Cache dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: starter/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('starter/frontend/package-lock.json') }}

      # ✅ Install deps
      - name: Install dependencies
        run: npm ci

      # ✅ Run lint
      - name: Run lint
        run: npm run lint


  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - uses: actions/checkout@v3

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Cache dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: starter/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('starter/frontend/package-lock.json') }}

      # ✅ Install deps
      - name: Install dependencies
        run: npm ci

      # ✅ Run tests
      - name: Run tests
        run: npm test


  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - uses: actions/checkout@v3

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Cache dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: starter/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('starter/frontend/package-lock.json') }}

      # ✅ Install deps
      - name: Install dependencies
        run: npm ci

      # ✅ Run tests again (REQUIRED by reviewer)
      - name: Run tests
        run: npm test

      # ✅ Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg REACT_APP_MOVIE_API_URL=${{ secrets.REACT_APP_MOVIE_API_URL }} \
            -t frontend:test .
